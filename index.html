<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyChat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #0d0d0d;
  color: #f0f0f0;
  font-family: -apple-system, Helvetica, Arial, sans-serif;
  height: 100vh;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  overflow: hidden;
}

#setup {
  -webkit-flex: 1; flex: 1;
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
  padding: 20px;
}
.logo { font-size: 40px; font-weight: 700; color: #00e5a0; margin-bottom: 6px; text-align: center; }
.logo span { color: #f0f0f0; }
.subtitle { color: #666; font-size: 13px; text-align: center; margin-bottom: 20px; line-height: 1.5; }
.card {
  width: 100%; max-width: 340px;
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
}
.lbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 14px; }
.lbl:first-child { margin-top: 0; }
input[type=text] {
  width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
  border-radius: 10px; padding: 12px 16px; color: #f0f0f0;
  font-size: 16px; outline: none; -webkit-appearance: none; display: block;
}
.role-picker { display: -webkit-flex; display: flex; gap: 8px; }
.role-btn {
  -webkit-flex: 1; flex: 1; padding: 12px 8px; border-radius: 10px;
  border: 1px solid #2a2a2a; background: #0d0d0d; color: #666;
  font-size: 14px; cursor: pointer; text-align: center; -webkit-appearance: none; display: block;
}
.role-btn.active { border-color: #00e5a0; color: #00e5a0; background: #001a0e; }
.btn-main {
  background: #00e5a0; color: #000; border: none; border-radius: 10px;
  padding: 16px; font-size: 17px; font-weight: 700; cursor: pointer;
  width: 100%; margin-top: 16px; -webkit-appearance: none; display: block;
}
.hint {
  background: #001030; border: 1px solid #003080; border-radius: 10px;
  padding: 12px; font-size: 12px; color: #6ab0ff; line-height: 1.6;
  text-align: center; max-width: 340px; width: 100%;
}

#chat {
  display: none;
  -webkit-flex-direction: column; flex-direction: column;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}
.header {
  background: #161616; border-bottom: 1px solid #2a2a2a; padding: 10px 14px;
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: space-between; justify-content: space-between;
  -webkit-flex-shrink: 0; flex-shrink: 0;
}
.header-left { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; }
.avatar {
  width: 36px; height: 36px; border-radius: 18px; background: #00e5a0;
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
  font-size: 18px; margin-right: 10px;
}
.chat-name { font-size: 14px; font-weight: 600; }
.chat-status { font-size: 11px; color: #666; margin-top: 1px; }
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 3px; background: #444; margin-right: 4px; }
.dot.on { background: #00e5a0; }
.exit-btn {
  background: transparent; border: 1px solid #2a2a2a; border-radius: 8px;
  padding: 6px 12px; color: #666; font-size: 12px; cursor: pointer;
}

#messages {
  -webkit-flex: 1; flex: 1;
  overflow-y: scroll; -webkit-overflow-scrolling: touch;
  padding: 12px; min-height: 0;
}
.msg {
  max-width: 80%; padding: 9px 13px; border-radius: 16px;
  font-size: 15px; line-height: 1.5; word-break: break-word; margin-bottom: 7px;
}
.msg.me { margin-left: auto; background: #003d22; border: 1px solid #005030; border-bottom-right-radius: 4px; }
.msg.them { margin-right: auto; background: #1a1a1a; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; color: #555; margin-top: 3px; text-align: right; }
.msg.them .msg-time { text-align: left; }
.msg-sender { font-size: 11px; color: #00e5a0; margin-bottom: 3px; font-weight: 600; }
.empty { text-align: center; color: #444; font-size: 14px; padding: 40px 20px; }

/* Media in messages */
.msg-img {
  max-width: 100%; border-radius: 10px; display: block;
  margin-top: 4px; cursor: pointer;
}
.msg-video {
  max-width: 100%; border-radius: 10px; display: block;
  margin-top: 4px; max-height: 300px;
}
.msg-link {
  color: #00e5a0; text-decoration: underline; font-size: 13px;
  display: block; margin-top: 4px; word-break: break-all;
}

/* Upload progress */
.upload-progress {
  background: #161616; border-top: 1px solid #2a2a2a;
  padding: 8px 14px; font-size: 12px; color: #00e5a0;
  display: none; -webkit-flex-shrink: 0; flex-shrink: 0;
}
.progress-bar-wrap { background: #2a2a2a; border-radius: 4px; height: 4px; margin-top: 4px; }
.progress-bar { background: #00e5a0; border-radius: 4px; height: 4px; width: 0%; transition: width 0.2s; }

.input-wrap {
  background: #161616; border-top: 1px solid #2a2a2a;
  padding: 10px 12px;
  display: -webkit-flex; display: flex;
  -webkit-align-items: flex-end; align-items: flex-end;
  -webkit-flex-shrink: 0; flex-shrink: 0;
}
.attach-btn {
  width: 42px; height: 42px; border-radius: 21px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  cursor: pointer; font-size: 20px; line-height: 42px;
  text-align: center; -webkit-appearance: none;
  -webkit-flex-shrink: 0; flex-shrink: 0;
  margin-right: 8px;
}
#msgInput {
  -webkit-flex: 1; flex: 1; background: #0d0d0d; border: 1px solid #2a2a2a;
  border-radius: 18px; padding: 9px 14px; color: #f0f0f0;
  font-size: 15px; outline: none; resize: none; line-height: 1.4;
  -webkit-appearance: none; margin-right: 8px;
}
.send-btn {
  width: 42px; height: 42px; border-radius: 21px; background: #00e5a0;
  border: none; cursor: pointer; font-size: 20px; line-height: 42px;
  text-align: center; -webkit-appearance: none;
  -webkit-flex-shrink: 0; flex-shrink: 0;
}

/* Lightbox */
#lightbox {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95); z-index: 999;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
}
#lightbox img { max-width: 100%; max-height: 100%; }
#lightbox-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,0.1); border: none; color: #fff;
  font-size: 28px; width: 44px; height: 44px; border-radius: 22px;
  cursor: pointer; line-height: 44px; text-align: center;
}

#fileInput { display: none; }

.notif {
  position: fixed; top: 14px; left: 50%;
  -webkit-transform: translateX(-50%); transform: translateX(-50%);
  background: #00e5a0; color: #000; padding: 8px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 600; display: none; z-index: 200;
}
</style>
</head>
<body>

<div id="setup">
  <div class="logo">My<span>Chat</span></div>
  <div class="subtitle">Личный мессенджер между<br>твоими устройствами</div>
  <div class="card">
    <div class="lbl">Твоё имя</div>
    <input type="text" id="nameInput" placeholder="Например: Vova" maxlength="20">
    <div class="lbl">Код комнаты (поделись с друзьями)</div>
    <input type="text" id="roomInput" placeholder="Например: vova333" maxlength="30">
    <button class="btn-main" onclick="startChat()">Войти в чат →</button>
  </div>
  <div class="hint">💡 Введи одинаковый <strong>код комнаты</strong> на всех устройствах — любое количество людей!</div>
</div>

<div id="chat">
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="partnerAvatar">💬</div>
      <div>
        <div class="chat-name" id="partnerName">Чат</div>
        <div class="chat-status"><span class="dot on" id="statusDot"></span><span id="statusText">0 онлайн</span></div>
      </div>
    </div>
    <button class="exit-btn" onclick="exitChat()">Выйти</button>
  </div>

  <div class="upload-progress" id="uploadProgress">
    <span id="uploadLabel">Загружаю файл...</span>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="messages">
    <div class="empty" id="emptyState">💬 Сообщений пока нет<br><span style="font-size:12px">Напиши первым!</span></div>
  </div>

  <div class="input-wrap">
    <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <textarea id="msgInput" rows="1" placeholder="Написать..."></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf">

<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="notif" id="notif"></div>

<script>
var SUPABASE_URL = 'https://pmjycpsfmubdlcvmivxm.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtanljcHNmbXViZGxjdm1pdnhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTg5NjAsImV4cCI6MjA5MDQzNDk2MH0.lTorkv8Ky1Mh-3Ucz94GQAFrTv9OrKHFnKh1F3G9AFQ';
var BUCKET = 'media';

var myName = '';
var roomId = '';
var lastId = 0;
var pollTimer = null;
var heartbeatTimer = null;
var statusTimer = null;
var myHbId = null;

function startChat() {
  var nameVal = document.getElementById('nameInput').value;
  var roomVal = document.getElementById('roomInput').value;
  myName = nameVal.replace(/^\s+|\s+$/g, '');
  roomId = roomVal.replace(/^\s+|\s+$/g, '');
  if (!myName) { showNotif('Введи своё имя'); return; }
  if (!roomId) { showNotif('Введи код чата'); return; }

  myHbId = myName + '_' + Date.now();
  document.getElementById('partnerName').textContent = roomId;

  document.getElementById('setup').style.display = 'none';
  var chatEl = document.getElementById('chat');
  chatEl.style.display = 'block';
  chatEl.style.display = '-webkit-flex';
  chatEl.style.display = 'flex';

  loadMessages();
  pollTimer = setInterval(pollMessages, 3000);
  heartbeatTimer = setInterval(sendHeartbeat, 8000);
  statusTimer = setInterval(checkStatus, 5000);
  sendHeartbeat();
  checkStatus();
}

function req(method, path, data, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, SUPABASE_URL + '/rest/v1/' + path, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  if (method === 'POST' || method === 'PATCH') xhr.setRequestHeader('Prefer', 'return=minimal');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      var result = null;
      try { result = JSON.parse(xhr.responseText); } catch(e) {}
      if (cb) cb(xhr.status, result);
    }
  };
  xhr.send(data ? JSON.stringify(data) : null);
}

function loadMessages() {
  var path = 'messages?room=eq.' + encodeURIComponent(roomId) + '&order=id.asc&limit=100';
  req('GET', path, null, function(status, data) {
    if (!data || !data.length) return;
    var es = document.getElementById('emptyState');
    if (es) es.parentNode.removeChild(es);
    for (var i = 0; i < data.length; i++) {
      renderMsg(data[i]);
      if (data[i].id > lastId) lastId = data[i].id;
    }
    scrollToBottom();
  });
}

function pollMessages() {
  var path = 'messages?room=eq.' + encodeURIComponent(roomId) + '&id=gt.' + lastId + '&order=id.asc';
  req('GET', path, null, function(status, data) {
    if (!data || !data.length) return;
    var es = document.getElementById('emptyState');
    if (es) es.parentNode.removeChild(es);
    for (var i = 0; i < data.length; i++) {
      renderMsg(data[i]);
      if (data[i].id > lastId) lastId = data[i].id;
    }
    scrollToBottom();
  });
}

function renderMsg(m) {
  var isMe = m.sender === myName;
  var d = new Date(m.created_at);
  var h = d.getHours(); if (h < 10) h = '0' + h;
  var mn = d.getMinutes(); if (mn < 10) mn = '0' + mn;
  var time = h + ':' + mn;

  var div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'them');
  var html = '';
  if (!isMe) html += '<div class="msg-sender">' + esc(m.sender) + '</div>';

  // Check if message is a media URL
  var text = m.text;
  if (text.indexOf('[img]') === 0) {
    var url = text.replace('[img]', '');
    html += '<img class="msg-img" src="' + url + '" onclick="openLightbox(\'' + url + '\')">';
  } else if (text.indexOf('[video]') === 0) {
    var url = text.replace('[video]', '');
    html += '<video class="msg-video" src="' + url + '" controls playsinline webkit-playsinline></video>';
  } else if (text.indexOf('[audio]') === 0) {
    var url = text.replace('[audio]', '');
    var name = url.split('/').pop();
    html += '<div style="margin-top:4px"><div style="font-size:12px;color:#00e5a0;margin-bottom:4px">🎵 ' + esc(name) + '</div><audio controls style="width:100%;max-width:260px"><source src="' + url + '"><a href="' + url + '" target="_blank" class="msg-link">Открыть музыку</a></audio></div>';
  } else if (text.indexOf('[pdf]') === 0) {
    var url = text.replace('[pdf]', '');
    var name = url.split('/').pop();
    html += '<a href="' + url + '" target="_blank" class="msg-link">📄 ' + esc(decodeURIComponent(name)) + '</a>';
  } else if (text.indexOf('[file]') === 0) {
    var url = text.replace('[file]', '');
    var name = url.split('/').pop();
    html += '<a href="' + url + '" target="_blank" class="msg-link">📎 ' + esc(decodeURIComponent(name)) + '</a>';
  } else {
    html += '<div>' + esc(text) + '</div>';
  }

  html += '<div class="msg-time">' + time + '</div>';
  div.innerHTML = html;
  document.getElementById('messages').appendChild(div);
}

function sendMessage() {
  var input = document.getElementById('msgInput');
  var text = input.value.replace(/^\s+|\s+$/g, '');
  if (!text) return;
  input.value = '';
  req('POST', 'messages', { room: roomId, sender: myName, text: text }, function(status) {
    if (status < 200 || status > 299) showNotif('Ошибка отправки');
  });
}

// File upload
document.getElementById('fileInput').addEventListener('change', function() {
  var file = this.files[0];
  if (!file) return;
  this.value = '';

  var isVideo = file.type.indexOf('video') === 0;
  var isAudio = file.type.indexOf('audio') === 0;
  var ext = file.name.split('.').pop();
  var fileName = Date.now() + '_' + Math.random().toString(36).substr(2, 6) + '.' + ext;

  // Show progress
  var prog = document.getElementById('uploadProgress');
  var bar = document.getElementById('progressBar');
  var label = document.getElementById('uploadLabel');
  prog.style.display = 'block';
  label.textContent = isVideo ? 'Загружаю видео...' : isAudio ? 'Загружаю музыку...' : 'Загружаю файл...';
  bar.style.width = '0%';

  var xhr = new XMLHttpRequest();
  xhr.open('POST', SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + fileName, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', file.type);

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable) {
      var pct = Math.round(e.loaded / e.total * 100);
      bar.style.width = pct + '%';
    }
  };

  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      prog.style.display = 'none';
      if (xhr.status >= 200 && xhr.status < 300) {
        var publicUrl = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + fileName;
        var prefix = '[file]';
        if (isVideo) prefix = '[video]';
        else if (file.type.indexOf('image') === 0) prefix = '[img]';
        else if (file.type.indexOf('audio') === 0) prefix = '[audio]';
        else if (file.type === 'application/pdf') prefix = '[pdf]';
        req('POST', 'messages', { room: roomId, sender: myName, text: prefix + publicUrl }, function(s) {
          if (s < 200 || s > 299) showNotif('Ошибка отправки');
        });
      } else {
        showNotif('Ошибка загрузки файла');
      }
    }
  };

  xhr.send(file);
});

function openLightbox(url) {
  var lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = url;
  lb.style.display = '-webkit-flex';
  lb.style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.getElementById('lightboxImg').src = '';
}

function sendHeartbeat() {
  var hbRoom = '__hb_' + roomId;
  req('GET', 'messages?room=eq.' + encodeURIComponent(hbRoom) + '&sender=eq.' + encodeURIComponent(myHbId), null, function(status, data) {
    if (data && data.length > 0) {
      req('PATCH', 'messages?room=eq.' + encodeURIComponent(hbRoom) + '&sender=eq.' + encodeURIComponent(myHbId), { text: String(Date.now()) }, null);
    } else {
      req('POST', 'messages', { room: hbRoom, sender: myHbId, text: String(Date.now()) }, null);
    }
  });
}

function checkStatus() {
  var hbRoom = '__hb_' + roomId;
  req('GET', 'messages?room=eq.' + encodeURIComponent(hbRoom) + '&limit=50', null, function(status, data) {
    var st = document.getElementById('statusText');
    var online = 0;
    var now = Date.now();
    if (data && data.length > 0) {
      for (var i = 0; i < data.length; i++) {
        var ts = parseInt(data[i].text, 10);
        if (now - ts < 25000) online++;
      }
    }
    st.textContent = online + ' онлайн';
  });
}

function exitChat() {
  clearInterval(pollTimer); clearInterval(heartbeatTimer); clearInterval(statusTimer);
  // Remove our heartbeat
  if (myHbId) {
    var hbRoom = '__hb_' + roomId;
    req('PATCH', 'messages?room=eq.' + encodeURIComponent(hbRoom) + '&sender=eq.' + encodeURIComponent(myHbId), { text: '0' }, null);
  }
  lastId = 0;
  document.getElementById('messages').innerHTML = '<div class="empty" id="emptyState">💬 Сообщений пока нет<br><span style="font-size:12px">Напиши первым!</span></div>';
  var setupEl = document.getElementById('setup');
  setupEl.style.display = 'block';
  setupEl.style.display = '-webkit-flex';
  setupEl.style.display = 'flex';
  document.getElementById('chat').style.display = 'none';
}

function scrollToBottom() {
  var c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

function showNotif(msg) {
  var n = document.getElementById('notif');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(function() { n.style.display = 'none'; }, 2500);
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('msgInput').addEventListener('focus', function() {
    setTimeout(function() { scrollToBottom(); }, 500);
  });
});
</script>
</body>
</html>
