<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MyChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #00e5a0;
    --accent2: #0077ff;
    --text: #f0f0f0;
    --muted: #666;
    --me-bg: #003d22;
    --them-bg: #1a1a1a;
    --font: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* SETUP SCREEN */
  #setup {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
  }

  .logo {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: -2px;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,160,0.3);
  }

  .logo span { color: var(--text); }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }

  .setup-card {
    width: 100%;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .setup-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: -8px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  .role-picker {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .role-btn {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .role-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.08);
  }

  .btn-main {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }

  .btn-main:active { opacity: 0.8; }

  .hint {
    background: rgba(0,119,255,0.08);
    border: 1px solid rgba(0,119,255,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: #6ab0ff;
    line-height: 1.6;
    text-align: center;
  }

  /* CHAT SCREEN */
  #chat { flex: 1; display: none; flex-direction: column; height: 100dvh; }

  .chat-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-header-left { display: flex; align-items: center; gap: 12px; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; color: #000;
    flex-shrink: 0;
  }

  .chat-name { font-size: 15px; font-weight: 600; }
  .chat-status { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: #555; margin-right: 5px;
    transition: background 0.3s;
  }
  .status-dot.online { background: var(--accent); }

  .exit-btn {
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px;
    color: var(--muted); font-family: var(--font); font-size: 12px;
    cursor: pointer;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.me {
    align-self: flex-end;
    background: var(--me-bg);
    border: 1px solid rgba(0,229,160,0.15);
    border-bottom-right-radius: 4px;
  }

  .msg.them {
    align-self: flex-start;
    background: var(--them-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }

  .msg.them .msg-time { text-align: left; }

  .msg-sender {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 3px;
    font-weight: 600;
  }

  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 0 8px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  .empty-icon { font-size: 40px; margin-bottom: 8px; }

  .chat-input-wrap {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #msgInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }

  #msgInput:focus { border-color: var(--accent); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.1s, opacity 0.2s;
  }

  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  .send-btn svg { width: 20px; height: 20px; fill: #000; }

  /* Notification */
  .notif {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #000;
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 99;
    white-space: nowrap;
  }
  .notif.show { opacity: 1; }

  .new-msg-banner {
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.25);
    border-radius: 10px;
    padding: 8px 16px;
    text-align: center;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    margin: 0 16px;
    flex-shrink: 0;
    display: none;
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">My<span>Chat</span></div>
  <div class="subtitle">Личный мессенджер между<br>твоими устройствами</div>

  <div class="setup-card">
    <div class="setup-label">Твоё имя</div>
    <input type="text" id="nameInput" placeholder="Например: Саша" maxlength="20">

    <div class="setup-label">Это устройство</div>
    <div class="role-picker">
      <button class="role-btn active" id="rolePhone" onclick="selectRole('phone')">📱 Телефон</button>
      <button class="role-btn" id="roleTablet" onclick="selectRole('tablet')">📟 Планшет</button>
    </div>

    <div class="setup-label">Код чата (одинаковый на обоих)</div>
    <input type="text" id="roomInput" placeholder="Например: mysecret123" maxlength="30">

    <button class="btn-main" onclick="startChat()">Войти в чат →</button>
  </div>

  <div class="hint">
    💡 Введи одинаковый <strong>код чата</strong> на обоих устройствах — и они соединятся
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="avatar" id="partnerAvatar">?</div>
      <div>
        <div class="chat-name" id="partnerName">Ждём...</div>
        <div class="chat-status"><span class="status-dot" id="statusDot"></span><span id="statusText">офлайн</span></div>
      </div>
    </div>
    <button class="exit-btn" onclick="exitChat()">Выйти</button>
  </div>

  <div id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div>Сообщений пока нет</div>
      <div style="font-size:11px;margin-top:4px">Напиши первым!</div>
    </div>
  </div>

  <div class="new-msg-banner" id="newMsgBanner" onclick="scrollToBottom()">
    ↓ Новое сообщение
  </div>

  <div class="chat-input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Написать..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
const STORAGE_KEY_PREFIX = 'mychat_';
const POLL_INTERVAL = 2500;
const HEARTBEAT_INTERVAL = 8000;
const OFFLINE_TIMEOUT = 20000;

let myName = '';
let myRole = 'phone';
let roomId = '';
let storageKey = '';
let heartbeatKey = '';
let partnerHeartbeatKey = '';
let lastMsgId = 0;
let pollTimer = null;
let heartbeatTimer = null;
let isAtBottom = true;
let allMessages = [];

function selectRole(r) {
  myRole = r;
  document.getElementById('rolePhone').classList.toggle('active', r === 'phone');
  document.getElementById('roleTablet').classList.toggle('active', r === 'tablet');
}

function startChat() {
  myName = document.getElementById('nameInput').value.trim();
  roomId = document.getElementById('roomInput').value.trim();
  if (!myName) { showNotif('Введи своё имя'); return; }
  if (!roomId) { showNotif('Введи код чата'); return; }

  storageKey = STORAGE_KEY_PREFIX + 'msgs_' + btoa(roomId).replace(/=/g,'');
  heartbeatKey = STORAGE_KEY_PREFIX + 'hb_' + myRole + '_' + btoa(roomId).replace(/=/g,'');
  partnerHeartbeatKey = STORAGE_KEY_PREFIX + 'hb_' + (myRole === 'phone' ? 'tablet' : 'phone') + '_' + btoa(roomId).replace(/=/g,'');

  const partnerName = myRole === 'phone' ? 'Планшет' : 'Телефон';
  document.getElementById('partnerName').textContent = partnerName;
  document.getElementById('partnerAvatar').textContent = myRole === 'phone' ? '📟' : '📱';

  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';

  loadMessages();
  startPolling();
  startHeartbeat();
}

function exitChat() {
  clearInterval(pollTimer);
  clearInterval(heartbeatTimer);
  localStorage.removeItem(heartbeatKey);
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('chat').style.display = 'none';
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div>Сообщений пока нет</div><div style="font-size:11px;margin-top:4px">Напиши первым!</div></div>';
  allMessages = [];
  lastMsgId = 0;
}

function loadMessages() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return;
    const msgs = JSON.parse(raw);
    allMessages = msgs;
    renderAll();
    lastMsgId = msgs.length > 0 ? msgs[msgs.length - 1].id : 0;
    scrollToBottom(true);
  } catch(e) {}
}

function renderAll() {
  const container = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');

  if (allMessages.length === 0) {
    if (!emptyState) {
      container.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><div>Сообщений пока нет</div><div style="font-size:11px;margin-top:4px">Напиши первым!</div></div>';
    }
    return;
  }

  // Remove empty state
  const es = document.getElementById('emptyState');
  if (es) es.remove();

  // Only render new messages
  const rendered = container.querySelectorAll('.msg').length;
  const toAdd = allMessages.slice(rendered);

  toAdd.forEach(msg => {
    const isMe = msg.sender === myName;
    const div = document.createElement('div');
    div.className = 'msg ' + (isMe ? 'me' : 'them');
    div.innerHTML = (!isMe ? `<div class="msg-sender">${escHtml(msg.sender)}</div>` : '') +
      `<div>${escHtml(msg.text)}</div><div class="msg-time">${msg.time}</div>`;
    container.appendChild(div);
  });
}

function startPolling() {
  pollTimer = setInterval(() => {
    checkNewMessages();
    checkPartnerStatus();
  }, POLL_INTERVAL);
}

function checkNewMessages() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return;
    const msgs = JSON.parse(raw);
    const newOnes = msgs.filter(m => m.id > lastMsgId);
    if (newOnes.length > 0) {
      allMessages = msgs;
      lastMsgId = msgs[msgs.length - 1].id;
      renderAll();
      const fromOther = newOnes.filter(m => m.sender !== myName);
      if (fromOther.length > 0) {
        if (!isAtBottom) {
          document.getElementById('newMsgBanner').style.display = 'block';
        } else {
          scrollToBottom();
        }
      } else {
        scrollToBottom();
      }
    }
  } catch(e) {}
}

function checkPartnerStatus() {
  try {
    const raw = localStorage.getItem(partnerHeartbeatKey);
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    if (!raw) {
      dot.classList.remove('online');
      statusText.textContent = 'офлайн';
      return;
    }
    const hb = JSON.parse(raw);
    const diff = Date.now() - hb.ts;
    if (diff < OFFLINE_TIMEOUT) {
      dot.classList.add('online');
      statusText.textContent = 'онлайн';
    } else {
      dot.classList.remove('online');
      statusText.textContent = 'офлайн';
    }
  } catch(e) {}
}

function startHeartbeat() {
  const send = () => {
    try {
      localStorage.setItem(heartbeatKey, JSON.stringify({ ts: Date.now(), name: myName }));
    } catch(e) {}
  };
  send();
  heartbeatTimer = setInterval(send, HEARTBEAT_INTERVAL);
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  try {
    const raw = localStorage.getItem(storageKey);
    const msgs = raw ? JSON.parse(raw) : [];
    const newMsg = {
      id: Date.now(),
      sender: myName,
      text: text,
      time: time,
      role: myRole
    };
    msgs.push(newMsg);
    // Keep last 200 messages
    if (msgs.length > 200) msgs.splice(0, msgs.length - 200);
    localStorage.setItem(storageKey, JSON.stringify(msgs));
    allMessages = msgs;
    lastMsgId = newMsg.id;
    renderAll();
    scrollToBottom();
  } catch(e) {
    showNotif('Ошибка сохранения');
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom(instant) {
  const container = document.getElementById('messages');
  document.getElementById('newMsgBanner').style.display = 'none';
  if (instant) {
    container.scrollTop = container.scrollHeight;
  } else {
    container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
  }
}

// Track scroll position
document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('messages');
  container.addEventListener('scroll', () => {
    const distFromBottom = container.scrollHeight - container.scrollTop - container.clientHeight;
    isAtBottom = distFromBottom < 80;
    if (isAtBottom) {
      document.getElementById('newMsgBanner').style.display = 'none';
    }
  });
});

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
