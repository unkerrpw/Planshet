<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
    --accent: #00e5a0; --text: #f0f0f0; --muted: #666;
    --me-bg: #003d22; --them-bg: #1a1a1a;
    --font: 'JetBrains Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* SETUP */
  #setup { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 28px; }
  .logo { font-size: 44px; font-weight: 600; letter-spacing: -2px; color: var(--accent); text-shadow: 0 0 30px rgba(0,229,160,0.3); }
  .logo span { color: var(--text); }
  .subtitle { color: var(--muted); font-size: 12px; text-align: center; line-height: 1.6; }
  .card { width: 100%; max-width: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: -6px; }
  input[type=text] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: var(--font); font-size: 15px; outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--accent); }
  .role-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .role-btn { padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font); font-size: 13px; cursor: pointer; transition: all .2s; text-align: center; }
  .role-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }
  .btn-main { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 14px; font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
  .btn-main:active { opacity: .8; }
  .hint { background: rgba(0,119,255,0.08); border: 1px solid rgba(0,119,255,0.2); border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #6ab0ff; line-height: 1.6; text-align: center; max-width: 340px; }

  /* CHAT */
  #chat { flex: 1; display: none; flex-direction: column; height: 100dvh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .chat-name { font-size: 14px; font-weight: 600; }
  .chat-status { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #555; margin-right: 4px; transition: background .3s; }
  .dot.on { background: var(--accent); }
  .exit-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--muted); font-family: var(--font); font-size: 12px; cursor: pointer; }

  #messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 7px; -webkit-overflow-scrolling: touch; }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { max-width: 78%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5; word-break: break-word; animation: msgIn .18s ease; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg.me { align-self: flex-end; background: var(--me-bg); border: 1px solid rgba(0,229,160,0.15); border-bottom-right-radius: 4px; }
  .msg.them { align-self: flex-start; background: var(--them-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: right; }
  .msg.them .msg-time { text-align: left; }
  .msg-sender { font-size: 11px; color: var(--accent); margin-bottom: 3px; font-weight: 600; }

  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-size: 13px; text-align: center; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }

  .input-wrap { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 14px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  #msgInput { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; color: var(--text); font-family: var(--font); font-size: 15px; outline: none; resize: none; max-height: 100px; line-height: 1.4; transition: border-color .2s; }
  #msgInput:focus { border-color: var(--accent); }
  .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:active { transform: scale(.92); }
  .send-btn svg { width: 20px; height: 20px; fill: #000; }

  .notif { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; white-space: nowrap; }
  .notif.show { opacity: 1; }
</style>
</head>
<body>

<div id="setup">
  <div class="logo">My<span>Chat</span></div>
  <div class="subtitle">Личный мессенджер между твоими устройствами</div>
  <div class="card">
    <div class="lbl">Твоё имя</div>
    <input type="text" id="nameInput" placeholder="Например: Саша" maxlength="20">
    <div class="lbl">Это устройство</div>
    <div class="role-picker">
      <button class="role-btn active" id="rolePhone" onclick="selectRole('phone')">📱 Телефон</button>
      <button class="role-btn" id="roleTablet" onclick="selectRole('tablet')">📟 Планшет</button>
    </div>
    <div class="lbl">Код чата (одинаковый на обоих)</div>
    <input type="text" id="roomInput" placeholder="Например: mysecret123" maxlength="30">
    <button class="btn-main" onclick="startChat()">Войти в чат →</button>
  </div>
  <div class="hint">💡 Введи одинаковый <strong>код чата</strong> на обоих устройствах</div>
</div>

<div id="chat">
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="partnerAvatar">?</div>
      <div>
        <div class="chat-name" id="partnerName">Ждём...</div>
        <div class="chat-status"><span class="dot" id="statusDot"></span><span id="statusText">офлайн</span></div>
      </div>
    </div>
    <button class="exit-btn" onclick="exitChat()">Выйти</button>
  </div>
  <div id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-icon">💬</div>
      <div>Сообщений пока нет</div>
      <div style="font-size:11px;margin-top:4px">Напиши первым!</div>
    </div>
  </div>
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Написать..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://pmjycpsfmubdlcvmivxm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtanljcHNmbXViZGxjdm1pdnhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTg5NjAsImV4cCI6MjA5MDQzNDk2MH0.lTorkv8Ky1Mh-3Ucz94GQAFrTv9OrKHFnKh1F3G9AFQ';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let myName = '', myRole = 'phone', roomId = '';
let subscription = null;
let heartbeatTimer = null;
let statusTimer = null;
let renderedIds = new Set();

function selectRole(r) {
  myRole = r;
  document.getElementById('rolePhone').classList.toggle('active', r === 'phone');
  document.getElementById('roleTablet').classList.toggle('active', r === 'tablet');
}

async function startChat() {
  myName = document.getElementById('nameInput').value.trim();
  roomId = document.getElementById('roomInput').value.trim();
  if (!myName) { showNotif('Введи своё имя'); return; }
  if (!roomId) { showNotif('Введи код чата'); return; }

  const partnerRole = myRole === 'phone' ? 'tablet' : 'phone';
  const partnerLabel = myRole === 'phone' ? 'Планшет 📟' : 'Телефон 📱';
  document.getElementById('partnerName').textContent = partnerLabel;
  document.getElementById('partnerAvatar').textContent = myRole === 'phone' ? '📟' : '📱';

  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';

  await loadMessages();
  subscribeMessages();
  startHeartbeat();
  startStatusCheck();
}

async function loadMessages() {
  const { data, error } = await sb
    .from('messages')
    .select('*')
    .eq('room', roomId)
    .order('created_at', { ascending: true })
    .limit(100);

  if (error) { showNotif('Ошибка загрузки'); return; }
  if (data && data.length > 0) {
    const es = document.getElementById('emptyState');
    if (es) es.remove();
    data.forEach(m => renderMsg(m));
    scrollToBottom();
  }
}

function subscribeMessages() {
  subscription = sb
    .channel('room-' + roomId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: 'room=eq.' + roomId
    }, payload => {
      const m = payload.new;
      if (renderedIds.has(m.id)) return;
      const es = document.getElementById('emptyState');
      if (es) es.remove();
      renderMsg(m);
      scrollToBottom();
    })
    .subscribe();
}

function renderMsg(m) {
  if (renderedIds.has(m.id)) return;
  renderedIds.add(m.id);

  const isMe = m.sender === myName;
  const d = new Date(m.created_at);
  const time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');

  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'them');
  div.innerHTML = (!isMe ? `<div class="msg-sender">${esc(m.sender)}</div>` : '') +
    `<div>${esc(m.text)}</div><div class="msg-time">${time}</div>`;
  document.getElementById('messages').appendChild(div);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const { error } = await sb.from('messages').insert({
    room: roomId,
    sender: myName,
    text: text
  });

  if (error) showNotif('Ошибка отправки');
}

function startHeartbeat() {
  const send = async () => {
    await sb.from('messages').upsert({
      room: '__hb_' + roomId + '_' + myRole,
      sender: myName,
      text: Date.now().toString()
    }, { onConflict: 'room,sender' }).select();
  };
  send();
  heartbeatTimer = setInterval(send, 8000);
}

function startStatusCheck() {
  statusTimer = setInterval(async () => {
    const partnerRole = myRole === 'phone' ? 'tablet' : 'phone';
    const { data } = await sb
      .from('messages')
      .select('text, created_at')
      .eq('room', '__hb_' + roomId + '_' + partnerRole)
      .limit(1)
      .maybeSingle();

    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    if (data) {
      const ts = parseInt(data.text);
      const diff = Date.now() - ts;
      if (diff < 20000) {
        dot.classList.add('on');
        statusText.textContent = 'онлайн';
        return;
      }
    }
    dot.classList.remove('on');
    statusText.textContent = 'офлайн';
  }, 5000);
}

function exitChat() {
  if (subscription) sb.removeChannel(subscription);
  clearInterval(heartbeatTimer);
  clearInterval(statusTimer);
  renderedIds.clear();
  document.getElementById('messages').innerHTML = '<div class="empty" id="emptyState"><div class="empty-icon">💬</div><div>Сообщений пока нет</div><div style="font-size:11px;margin-top:4px">Напиши первым!</div></div>';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('chat').style.display = 'none';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
